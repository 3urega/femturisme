<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin guies{% endblock %} — femturisme agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/admin.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="admin-body">
    <header class="admin-header border-bottom bg-white">
        <div class="container py-3 d-flex flex-wrap align-items-center justify-content-between gap-2">
            <div>
                <a href="{{ url_for('admin_ui.guides_list') }}" class="text-decoration-none text-dark">
                    <strong>femturisme</strong> · Admin guies PDF
                </a>
            </div>
            <nav class="d-flex gap-3 align-items-center">
                <a href="{{ url_for('admin_ui.guides_list') }}">Documents</a>
                <a href="{{ url_for('admin_ui.guides_upload') }}">Pujar guia</a>
                <button type="button" class="btn btn-sm btn-outline-secondary" id="admin-token-btn">
                    Token API
                </button>
            </nav>
        </div>
    </header>

    <main class="container py-4">
        <div id="admin-alert" class="alert alert-danger d-none" role="alert"></div>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='admin/admin.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

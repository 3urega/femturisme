<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#455a64"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="920" height="620" fill="#f8fafb"/>

  <text x="460" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#263238">Arquitectura agent femturisme</text>
  <text x="460" y="58" text-anchor="middle" font-size="13" fill="#607d8b">2 bases de dades | Docker (Python) | PostgreSQL gestionat</text>

  <rect x="40" y="90" width="200" height="72" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">Visitant</text>
  <text x="140" y="140" text-anchor="middle" font-size="12" fill="#455a64">Navega femturisme.cat</text>

  <rect x="680" y="90" width="200" height="72" rx="10" fill="#fff3e0" stroke="#f57c00" stroke-width="2" filter="url(#shadow)"/>
  <text x="780" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#e65100">Equip femturisme</text>
  <text x="780" y="140" text-anchor="middle" font-size="12" fill="#455a64">VPN / xarxa interna</text>

  <rect x="40" y="210" width="260" height="100" rx="10" fill="#ffffff" stroke="#00897b" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="238" text-anchor="middle" font-size="15" font-weight="700" fill="#00695c">femturisme.cat</text>
  <text x="170" y="260" text-anchor="middle" font-size="12" fill="#455a64">PHP + globus de xat</text>
  <text x="170" y="280" text-anchor="middle" font-size="11" fill="#78909c">Proxy POST /api/chat</text>
  <text x="170" y="298" text-anchor="middle" font-size="11" fill="#78909c">No puja PDFs | No LLM</text>

  <rect x="620" y="210" width="260" height="100" rx="10" fill="#ffffff" stroke="#f57c00" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="238" text-anchor="middle" font-size="15" font-weight="700" fill="#e65100">Panell admin PDFs</text>
  <text x="750" y="260" text-anchor="middle" font-size="12" fill="#455a64">/admin/guides</text>
  <text x="750" y="280" text-anchor="middle" font-size="11" fill="#78909c">Pujar guies | Veure estat</text>
  <text x="750" y="298" text-anchor="middle" font-size="11" fill="#78909c">Servit pel Python</text>

  <rect x="280" y="360" width="360" height="120" rx="12" fill="#eceff1" stroke="#546e7a" stroke-width="2" stroke-dasharray="6 4" filter="url(#shadow)"/>
  <text x="460" y="384" text-anchor="middle" font-size="13" font-weight="700" fill="#37474f">DOCKER - servidor agent</text>
  <rect x="320" y="400" width="280" height="64" rx="8" fill="#00796b" filter="url(#shadow)"/>
  <text x="460" y="428" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Python / Flask</text>
  <text x="460" y="450" text-anchor="middle" font-size="12" fill="#b2dfdb">API xat | LLM | tools | ingest PDFs</text>

  <rect x="580" y="510" width="300" height="88" rx="10" fill="#ede7f6" stroke="#5e35b1" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="538" text-anchor="middle" font-size="15" font-weight="700" fill="#4527a0">PostgreSQL gestionat</text>
  <text x="730" y="560" text-anchor="middle" font-size="12" fill="#455a64">Supabase / Neon / RDS</text>
  <text x="730" y="580" text-anchor="middle" font-size="11" fill="#78909c">pgvector | PDFs | embeddings</text>

  <rect x="40" y="510" width="300" height="88" rx="10" fill="#fff8e1" stroke="#ff8f00" stroke-width="2" filter="url(#shadow)"/>
  <text x="190" y="538" text-anchor="middle" font-size="15" font-weight="700" fill="#ef6c00">MySQL femturisme</text>
  <text x="190" y="560" text-anchor="middle" font-size="12" fill="#455a64">Servidor existent (web)</text>
  <text x="190" y="580" text-anchor="middle" font-size="11" fill="#78909c">Read-only | Catalog web</text>

  <line x1="140" y1="162" x2="140" y2="208" stroke="#455a64" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="780" y1="162" x2="750" y2="208" stroke="#455a64" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M 170 310 L 170 340 L 380 340 L 380 358" fill="none" stroke="#455a64" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 750 310 L 750 340 L 540 340 L 540 358" fill="none" stroke="#455a64" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="332" font-size="11" fill="#607d8b">SSE /api/chat</text>
  <text x="600" y="332" font-size="11" fill="#607d8b">HTTPS admin</text>

  <line x1="380" y1="480" x2="190" y2="508" stroke="#ef6c00" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="492" font-size="11" fill="#ef6c00" font-weight="600">SELECT (read-only)</text>

  <line x1="540" y1="480" x2="730" y2="508" stroke="#5e35b1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="492" font-size="11" fill="#5e35b1" font-weight="600">HTTPS read-write</text>

  <rect x="40" y="24" width="8" height="8" fill="#00796b"/>
  <text x="54" y="32" font-size="10" fill="#607d8b">Agent</text>
  <rect x="110" y="24" width="8" height="8" fill="#5e35b1"/>
  <text x="124" y="32" font-size="10" fill="#607d8b">BD agent (nova)</text>
  <rect x="220" y="24" width="8" height="8" fill="#ff8f00"/>
  <text x="234" y="32" font-size="10" fill="#607d8b">BD web (existent)</text>
</svg>
